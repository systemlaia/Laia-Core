- Home:
    - Home Assistant:
        icon: home-assistant.png
        href: http://homeassistant.local:8123
        description: LAIA Live System State
        widget:
          type: homeassistant
          url: http://homeassistant.local:8123
          key: "123456789abcdef"
          custom:
            - state: binary_sensor.rpi_power_status
              label: Pi Power
            - state: binary_sensor.zigbee2mqtt_bridge_connection_state
              label: Zigbee
            - state: sensor.backup_backup_manager_state
              label: Backups
            - state: sensor.0xb0ce1814036c5cf4_power
              label: Power Load

    - Home Assistant Overview:
        icon: home-assistant.png
        href: http://homeassistant.local:8123
        description: Full system view

