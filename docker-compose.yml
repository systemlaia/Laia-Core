name: laia-core

services:
  caddy:
    image: caddy:2
    container_name: laia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    networks:
      - laia

networks:
  laia:
    driver: bridge