services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: laia-homepage
    restart: unless-stopped
    ports:
      - "4000:3000"
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./archive:/archive:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=localhost:4000,localhost
    networks:
      - laia

  portainer:
    image: portainer/portainer-ce:latest
    container_name: laia-portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - laia

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: laia-filebrowser
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./archive:/srv
      - ./filebrowser:/config
    command:
      - --root=/srv
      - --database=/config/database.db
    networks:
      - laia

networks:
  laia:
    external: true
    name: laia-core_laia